name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the workflow every time you push to the main branch

permissions:
  contents: write # Allows the action to write to your gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'

      - name: Install Dependencies
        run: npm install # Cleaner, deterministic install for production environments

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite outputs the compiled code to the 'dist' directory
          branch: gh-pages # The target branch where your production assets sit